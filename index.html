<!DOCTYPE html>
<html>
<head>
<title>Ecommerce Profit Calculator</title>

<meta name="description" content="Free ecommerce profit calculator to calculate real profit after ads, shipping and payment fees.">

<style>
body{
font-family:Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
width:340px;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ddd;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#3b82f6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
margin-top:5px;
}

button:hover{
background:#2563eb;
}

#result,#goalresult{
margin-top:15px;
font-size:18px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>Profit Calculator</h1>

<input id="price" placeholder="Product price">
<input id="cost" placeholder="Product cost">
<input id="shipping" placeholder="Shipping cost">
<input id="ads" placeholder="Ad cost">
<input id="fee" placeholder="Payment fee %">

<button onclick="calc()">Calculate Profit</button>

<h2 id="result"></h2>

<br><br>

<input id="goal" placeholder="Profit goal (example 1000)">

<button onclick="calcGoal()">Sales needed</button>

<h2 id="goalresult"></h2>

</div>

<script>

function calc(){

var price=parseFloat(document.getElementById("price").value)||0;
var cost=parseFloat(document.getElementById("cost").value)||0;
var shipping=parseFloat(document.getElementById("shipping").value)||0;
var ads=parseFloat(document.getElementById("ads").value)||0;
var fee=parseFloat(document.getElementById("fee").value)||0;

var payment=price*(fee/100);

var profit=price-cost-shipping-ads-payment;

document.getElementById("result").innerHTML="Profit per sale: $" + profit.toFixed(2);

}

function calcGoal(){

var price=parseFloat(document.getElementById("price").value)||0;
var cost=parseFloat(document.getElementById("cost").value)||0;
var shipping=parseFloat(document.getElementById("shipping").value)||0;
var ads=parseFloat(document.getElementById("ads").value)||0;
var fee=parseFloat(document.getElementById("fee").value)||0;
var goal=parseFloat(document.getElementById("goal").value)||0;

var payment=price*(fee/100);

var profit=price-cost-shipping-ads-payment;

if(profit<=0){
document.getElementById("goalresult").innerHTML="No profit per sale";
return;
}

var sales=goal/profit;

document.getElementById("goalresult").innerHTML="Sales needed: " + Math.ceil(sales);

}

</script>

</body>
</html>
